name: Arduino Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Debug
        run: |
          pwd
          ls -la

      - name: Kill Serial Processes
        run: |
          pkill -f serial || true
          pkill -f arduino || true
          sleep 3

      - name: Compile
        run: |
          arduino-cli compile \
          --fqbn arduino:avr:uno .

      - name: Upload
        run: |
          sleep 5
          arduino-cli upload \
          -p /dev/cu.wchusbserial21110 \
          --fqbn arduino:avr:uno .