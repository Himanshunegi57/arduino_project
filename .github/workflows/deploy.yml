name: Arduino Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kill Serial Processes
        run: |
          pkill -f arduino || true
          pkill -f serial || true
          sleep 2

      - name: Install AVR Core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile
        run: |
          arduino-cli compile \
          --fqbn arduino:avr:uno .

      - name: Wait Before Upload
        run: sleep 5

      - name: Upload
        run: |
          arduino-cli upload \
          -p /dev/cu.wchusbserial21110 \
          --fqbn arduino:avr:uno .